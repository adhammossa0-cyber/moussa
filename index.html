<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحذير أمني!</title>
    <style>
        body {
            background-color: black;
            color: #00FF00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            border: 2px solid #00FF00;
            padding: 20px;
            box-shadow: 0 0 15px #00FF00;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            animation: blink 0.8s infinite;
        }

        .details {
            font-size: 1.2rem;
            line-height: 1.5;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        .loading-bar {
            width: 80%;
            height: 20px;
            border: 1px solid #00FF00;
            margin-top: 20px;
            position: relative;
        }

        .progress {
            width: 100%;
            height: 100%;
            background-color: #00FF00;
            animation: load 3s forwards;
        }

        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>تم تهكير الهاتف بنجاح! ⚠️</h1>
        <div class="details">
            <p>جاري سحب الصور والرسائل...</p>
            <p>IP Address: 192.168.1.105</p>
            <p>الحالة: متصل بالخادم المحتوي</p>
        </div>
        <div class="loading-bar">
            <div class="progress"></div>
        </div>
        <p style="margin-top: 20px; color: red;">هشام هكر هاتفك بنجاح!</p>
    </div>

</body>
</html>
